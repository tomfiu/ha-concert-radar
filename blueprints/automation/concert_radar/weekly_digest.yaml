blueprint:
  name: "Concert Radar: Weekly Concert Digest"
  description: >
    Send a weekly summary of upcoming concerts detected by Concert Radar.
    Uses the `sensor.concert_radar_weekly_digest` sensor (concerts in the
    next 7 days) as the data source.
  domain: automation
  input:
    digest_sensor:
      name: Weekly Digest sensor
      description: >
        The `sensor.concert_radar_weekly_digest` entity created by Concert Radar.
      default: sensor.concert_radar_weekly_digest
      selector:
        entity:
          domain: sensor
          integration: concert_radar
    notify_target:
      name: Notification target
      description: >
        The `notify.*` service to call, e.g. `notify.mobile_app_my_phone`.
      selector:
        text:
    digest_day:
      name: Day of week to send digest
      description: "0 = Monday … 6 = Sunday"
      default: 6
      selector:
        number:
          min: 0
          max: 6
    digest_hour:
      name: Hour to send digest (0–23)
      default: 18
      selector:
        number:
          min: 0
          max: 23
    skip_empty:
      name: Skip if no concerts this week
      description: >
        When enabled the notification is suppressed if there are no concerts
        in the next 7 days.
      default: true
      selector:
        boolean:

trigger:
  - platform: time
    at: "{{ '%02d:00:00' | format(digest_hour) }}"

condition:
  - condition: template
    value_template: "{{ now().weekday() == digest_day | int }}"
  - condition: template
    value_template: >
      {% set skip = '{{ skip_empty }}' | lower == 'true' %}
      {% set count = states('{{ digest_sensor }}') | int(0) %}
      {{ not skip or count > 0 }}

action:
  - service: !input notify_target
    data:
      title: "🎵 Your Weekly Concert Digest"
      message: >
        {{ state_attr('{{ digest_sensor }}', 'digest') }}

mode: single
