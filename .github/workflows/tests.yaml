name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov aiohttp voluptuous
      - name: Run tests
        run: |
          pytest tests/ --cov=custom_components/concert_radar --cov-report=xml -v
